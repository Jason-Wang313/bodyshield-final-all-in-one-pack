name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install lightweight dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install numpy pandas matplotlib pillow pyarrow pypdf pyyaml tabulate pytest
      - name: Format sanity
        run: python -m py_compile $(git ls-files "*.py")
      - name: Unit tests
        run: python -m pytest -q
      - name: Schema and dry-run audits
        run: |
          python scripts/smoke_check.py
          python scripts/run_derived_results_audit.py --json
          python scripts/run_results_integrity_audit.py --json
      - name: Paper source smoke
        run: python scripts/run_paper_source_audit.py --json
      - name: Citation placeholder check
        run: |
          ! grep -RInE "TODO|\\[N_sim\\]|\\[N_real\\]|\\[X\\]|\\[Y\\]|\\[Z\\]|undefined|Citation" paper reports
